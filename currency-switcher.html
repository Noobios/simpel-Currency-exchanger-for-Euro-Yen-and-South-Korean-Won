<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    min-height: 100vh;
    background: #0f1115;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #f2f2f2;
    padding: 20px;
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .active-card {
    background: #1a1d24;
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .flag { font-size: 34px; line-height: 1; }
  .active-info { flex: 1; }
  .active-code { font-size: 15px; opacity: 0.7; margin-bottom: 4px; }
  input#amountInput {
    width: 100%;
    font-size: 26px;
    background: transparent;
    border: none;
    color: #f2f2f2;
    padding: 0;
  }
  input#amountInput:focus { outline: none; }

  .refresh-row {
    display: flex;
    gap: 10px;
  }
  button {
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: #2a2f3a;
    color: #f2f2f2;
    cursor: pointer;
  }
  button.primary { background: #3a63e0; flex: 1; }
  button:active { filter: brightness(1.15); }

  .list { display: flex; flex-direction: column; gap: 10px; }

  .row-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
  }
  .row-delete-bg {
    position: absolute;
    inset: 0;
    background: #c0392b;
    display: flex;
    align-items: center;
    padding-left: 20px;
    font-size: 14px;
    font-weight: 600;
  }
  .row {
    position: relative;
    background: #1a1d24;
    padding: 14px 16px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
    touch-action: pan-y;
    transition: transform 0.15s ease;
  }
  .row .flag { font-size: 24px; }
  .row .code { font-weight: 600; font-size: 15px; width: 46px; }
  .row .value { margin-left: auto; font-size: 18px; }

  .status { font-size: 12px; opacity: 0.6; text-align: center; min-height: 16px; }
  .hint { font-size: 12px; opacity: 0.5; text-align: center; }

  .fab {
    position: fixed;
    right: 24px;
    bottom: 24px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #3a63e0;
    color: white;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 20;
    padding: 0;
  }
  .fab.open { background: #2a2f3a; }

  .add-panel {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #1a1d24;
    border-radius: 20px 20px 0 0;
    padding: 20px;
    box-shadow: 0 -6px 20px rgba(0,0,0,0.5);
    transform: translateY(100%);
    transition: transform 0.25s ease;
    z-index: 15;
    max-height: 60vh;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .add-panel.open { transform: translateY(0); }

  .add-panel input {
    width: 100%;
    font-size: 16px;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #101216;
    color: #f2f2f2;
  }
  .add-panel input:focus { outline: none; border-color: #5b8cff; }

  .country-results {
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .country-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    background: #101216;
  }
  .country-item .flag { font-size: 22px; }
  .country-item .names { flex: 1; }
  .country-item .country-name { font-size: 15px; }
  .country-item .currency-name { font-size: 12px; opacity: 0.6; }
  .country-item .country-code { font-size: 13px; font-weight: 600; opacity: 0.8; }
  .country-item.added { opacity: 0.4; }

  .backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10;
    display: none;
  }
  .backdrop.open { display: block; }
</style>
</head>
<body>

<div class="app">

  <div class="active-card">
    <div class="flag" id="activeFlag">🇪🇺</div>
    <div class="active-info">
      <div class="active-code" id="activeCode">EUR</div>
      <input type="text" id="amountInput" inputmode="decimal" value="1">
    </div>
  </div>

  <div class="refresh-row">
    <button class="primary" id="refreshButton">Kurs aktualisieren</button>
  </div>

  <div class="list" id="list"></div>

  <div class="hint">Zeile antippen = aktive Währung wechseln · nach rechts wischen = löschen</div>
  <div class="status" id="status">Kurse werden geladen …</div>

</div>

<div class="backdrop" id="backdrop"></div>

<button class="fab" id="fabButton">+</button>

<div class="add-panel" id="addPanel">
  <input type="text" id="countrySearch" placeholder="Land eingeben, z. B. Thailand" autocomplete="off">
  <div class="country-results" id="countryResults"></div>
</div>

    { name: "Kanada", code: "CAD", flag: "🇨🇦" },
    { name: "Neuseeland", code: "NZD", flag: "🇳🇿" },
    { name: "Schweden", code: "SEK", flag: "🇸🇪" },
    { name: "Norwegen", code: "NOK", flag: "🇳🇴" },
    { name: "Dänemark", code: "DKK", flag: "🇩🇰" },
    { name: "Polen", code: "PLN", flag: "🇵🇱" },
    { name: "Tschechien", code: "CZK", flag: "🇨🇿" },
    { name: "Ungarn", code: "HUF", flag: "🇭🇺" },
    { name: "Thailand", code: "THB", flag: "🇹🇭" },
    { name: "Singapur", code: "SGD", flag: "🇸🇬" },
    { name: "Hongkong", code: "HKD", flag: "🇭🇰" },
    { name: "Indien", code: "INR", flag: "🇮🇳" },
    { name: "Indonesien", code: "IDR", flag: "🇮🇩" },
    { name: "Malaysia", code: "MYR", flag: "🇲🇾" },
    { name: "Philippinen", code: "PHP", flag: "🇵🇭" },
    { name: "Vietnam", code: "VND", flag: "🇻🇳" },
    { name: "Mexiko", code: "MXN", flag: "🇲🇽" },
    { name: "Brasilien", code: "BRL", flag: "🇧🇷" },
    { name: "Südafrika", code: "ZAR", flag: "🇿🇦" },
    { name: "Türkei", code: "TRY", flag: "🇹🇷" },
    { name: "Vereinigte Arabische Emirate", code: "AED", flag: "🇦🇪" },
    { name: "Israel", code: "ILS", flag: "🇮🇱" },
    { name: "Russland", code: "RUB", flag: "🇷🇺" },
    { name: "Taiwan", code: "TWD", flag: "🇹🇼" }
  ];

  let currencies = ["EUR", "KRW", "JPY"];
  let activeCurrency = "EUR";
  let rates = { EUR: 1, KRW: 1550, JPY: 165 }; // Fallback bis Live-Daten geladen sind

  const listEl = document.getElementById("list");
  const activeFlag = document.getElementById("activeFlag");
  const activeCode = document.getElementById("activeCode");
  const amountInput = document.getElementById("amountInput");
  const statusEl = document.getElementById("status");
  const refreshButton = document.getElementById("refreshButton");
  const fabButton = document.getElementById("fabButton");
  const addPanel = document.getElementById("addPanel");
  const backdrop = document.getElementById("backdrop");
  const countrySearch = document.getElementById("countrySearch");
  const countryResults = document.getElementById("countryResults");

  function flagFor(code) {
    return flagMap[code] || "🏳️";
  }

  function setActive(code) {
    activeCurrency = code;
    activeFlag.textContent = flagFor(code);
    activeCode.textContent = code;
    render();
  }

  function render() {
    listEl.innerHTML = "";
    const amount = parseFloat(amountInput.value.replace(",", ".")) || 0;
    const amountInEur = amount / (rates[activeCurrency] || 1);

    currencies
      .filter(c => c !== activeCurrency)
      .forEach(code => {
        const converted = amountInEur * (rates[code] || 0);

        const wrap = document.createElement("div");
        wrap.className = "row-wrap";

        const bg = document.createElement("div");
        bg.className = "row-delete-bg";
        bg.textContent = "Löschen";
        wrap.appendChild(bg);

        const row = document.createElement("div");
        row.className = "row";
        row.innerHTML = `
          <span class="flag">${flagFor(code)}</span>
          <span class="code">${code}</span>
          <span class="value">${converted.toLocaleString("de-DE", {maximumFractionDigits: 2})}</span>
        `;
        wrap.appendChild(row);
        listEl.appendChild(wrap);

        attachSwipeToDelete(row, wrap, code);

        row.addEventListener("click", (e) => {
          if (row.dataset.swiped === "true") return;
          setActive(code);
        });
      });
  }

  function attachSwipeToDelete(row, wrap, code) {
    let startX = 0;
    let currentX = 0;
    let dragging = false;

    row.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      dragging = true;
      row.style.transition = "none";
      row.dataset.swiped = "false";
    }, { passive: true });

    row.addEventListener("touchmove", (e) => {
      if (!dragging) return;
      currentX = e.touches[0].clientX - startX;
      if (currentX < 0) currentX = 0;
      row.style.transform = `translateX(${currentX}px)`;
      if (currentX > 40) row.dataset.swiped = "true";
    }, { passive: true });

    row.addEventListener("touchend", () => {
      dragging = false;
      row.style.transition = "transform 0.2s ease";
      const threshold = wrap.offsetWidth * 0.4;
      if (currentX > threshold) {
        row.style.transform = `translateX(${wrap.offsetWidth}px)`;
        setTimeout(() => {
          currencies = currencies.filter(c => c !== code);
          render();
        }, 180);
      } else {
        row.style.transform = "translateX(0)";
        setTimeout(() => { row.dataset.swiped = "false"; }, 200);
      }
      currentX = 0;
    });
  }

  async function fetchRates() {
    statusEl.textContent = "Kurse werden aktualisiert …";
    try {
      const res = await fetch("https://open.er-api.com/v6/latest/EUR");
      const data = await res.json();
      if (data && data.rates) {
        rates = data.rates;
        rates.EUR = 1;
        statusEl.textContent = "Aktualisiert: " + new Date().toLocaleTimeString("de-DE");
      } else {
        statusEl.textContent = "Kurse konnten nicht gelesen werden – alte Werte verwendet";
      }
    } catch (err) {
      statusEl.textContent = "Kein Internet – alte Werte verwendet";
    }
    render();
  }

  function openPanel() {
    addPanel.classList.add("open");
    backdrop.classList.add("open");
    fabButton.textContent = "×";
    fabButton.classList.add("open");
    countrySearch.value = "";
    renderCountryResults("");
    countrySearch.focus();
  }

  function closePanel() {
    addPanel.classList.remove("open");
    backdrop.classList.remove("open");
    fabButton.textContent = "+";
    fabButton.classList.remove("open");
    countrySearch.blur();
  }

  function renderCountryResults(query) {
    const q = query.trim().toLowerCase();
    const matches = q.length === 0
      ? []
      : countries.filter(c => c.name.toLowerCase().includes(q));

    countryResults.innerHTML = "";
    matches.slice(0, 8).forEach(c => {
      const already = currencies.includes(c.code);
      const item = document.createElement("div");
      item.className = "country-item" + (already ? " added" : "");
      item.innerHTML = `
        <span class="flag">${c.flag}</span>
        <span class="names">
          <div class="country-name">${c.name}</div>
          <div class="currency-name">${c.code}</div>
        </span>
        <span class="country-code">${already ? "✓" : "+"}</span>
      `;
      if (!already) {
        item.addEventListener("click", () => {
          currencies.push(c.code);
          render();
          renderCountryResults(countrySearch.value);
        });
      }
      countryResults.appendChild(item);
    });
  }

  fabButton.addEventListener("click", () => {
    if (addPanel.classList.contains("open")) {
      closePanel();
    } else {
      openPanel();
    }
  });
  backdrop.addEventListener("click", closePanel);
  countrySearch.addEventListener("input", () => renderCountryResults(countrySearch.value));

  refreshButton.addEventListener("click", fetchRates);
  amountInput.addEventListener("input", render);

  setActive("EUR");
  fetchRates();
</script>

</body>
</html>
