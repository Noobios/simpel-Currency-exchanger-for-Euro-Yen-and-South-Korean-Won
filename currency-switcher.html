<style>
  :root {
    color-scheme: dark;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0f1115;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: #f2f2f2;
    padding: 24px;
  }
  .card {
    width: 100%;
    max-width: 380px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .currency-label {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  input[type="text"] {
    width: 100%;
    font-size: 26px;
    text-align: center;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid #333;
    background: #1a1d24;
    color: #f2f2f2;
  }
  input[type="text"]:focus {
    outline: none;
    border-color: #5b8cff;
  }
  .buttons-row {
    display: flex;
    gap: 12px;
    width: 100%;
  }
  button {
    flex: 1;
    font-size: 16px;
    padding: 14px 10px;
    border-radius: 12px;
    border: none;
    background: #2a2f3a;
    color: #f2f2f2;
    cursor: pointer;
  }
  button:active {
    background: #3a4152;
  }
  button.primary {
    background: #3a63e0;
  }
  button.primary:active {
    background: #2c4dc0;
  }
  .results {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .result-row {
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    background: #1a1d24;
    padding: 12px 16px;
    border-radius: 10px;
  }
  .status {
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
    min-height: 16px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="currency-label" id="currencyLabel">EUR</div>

  <input type="text" id="amountInput" inputmode="decimal" placeholder="Betrag eingeben" value="1">

  <div class="buttons-row">
    <button id="switchButton">Währung wechseln</button>
    <button id="refreshButton" class="primary">Kurs aktualisieren</button>
  </div>

  <div class="results" id="results"></div>
  <div class="status" id="status">Kurse werden geladen …</div>
</div>

<script>
  const currencyOrder = ["EUR", "KRW", "JPY"];
  let currentIndex = 0;

  // rates[X] = wie viel X man für 1 EUR bekommt
  let rates = { EUR: 1, KRW: 1550, JPY: 165 }; // Fallback-Werte, werden beim Laden ersetzt

  const currencyLabel = document.getElementById("currencyLabel");
  const amountInput = document.getElementById("amountInput");
  const results = document.getElementById("results");
  const statusEl = document.getElementById("status");
  const switchButton = document.getElementById("switchButton");
  const refreshButton = document.getElementById("refreshButton");

  function updateLabel() {
    currencyLabel.textContent = currencyOrder[currentIndex];
  }

  function recalculate() {
    const raw = amountInput.value.replace(",", ".");
    const amount = parseFloat(raw);
    results.innerHTML = "";
    if (isNaN(amount)) return;

    const currentCurrency = currencyOrder[currentIndex];
    const amountInEur = amount / rates[currentCurrency];

    currencyOrder
      .filter(c => c !== currentCurrency)
      .forEach(target => {
        const converted = amountInEur * rates[target];
        const row = document.createElement("div");
        row.className = "result-row";
        row.innerHTML = `<span>${target}</span><span>${converted.toLocaleString("de-DE", {maximumFractionDigits: 2})}</span>`;
        results.appendChild(row);
      });
  }

  async function fetchRates() {
    statusEl.textContent = "Kurse werden aktualisiert …";
    try {
      const res = await fetch("https://open.er-api.com/v6/latest/EUR");
      const data = await res.json();
      if (data && data.rates && data.rates.KRW && data.rates.JPY) {
        rates = { EUR: 1, KRW: data.rates.KRW, JPY: data.rates.JPY };
        const time = new Date();
        statusEl.textContent = "Aktualisiert: " + time.toLocaleTimeString("de-DE");
      } else {
        statusEl.textContent = "Kurse konnten nicht gelesen werden – alte Werte werden verwendet";
      }
    } catch (err) {
      statusEl.textContent = "Kein Internet oder Fehler – alte Werte werden verwendet";
    }
    recalculate();
  }

  switchButton.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % currencyOrder.length;
    updateLabel();
    recalculate();
  });

  refreshButton.addEventListener("click", fetchRates);
  amountInput.addEventListener("input", recalculate);

  updateLabel();
  fetchRates();
</script>

</body>
</html>
